<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Comissões</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="content-shell">
    <ion-card class="summary-card">
      <ion-card-content>
        <p class="summary-label">Total vendido</p>
        <h1 class="summary-total">{{ formatarMoeda(total) }}</h1>

        <p class="summary-label">Comissão</p>
        <h2 class="summary-commission">{{ formatarMoeda(comissao) }}</h2>

        <p class="meta-message" *ngIf="falta > 0">
          Faltam {{ formatarMoeda(falta) }} para a próxima meta.
        </p>
        <p class="meta-message success" *ngIf="falta === 0">
          🎉 Meta máxima atingida!
        </p>

        <ion-progress-bar [value]="progresso" [color]="corProgresso"></ion-progress-bar>
      </ion-card-content>
    </ion-card>

    <ion-item lines="inset" class="input-item">
      <ion-input
        type="text"
        inputmode="decimal"
        placeholder="R$ 0,00"
        [(ngModel)]="novaVenda"
        (ionInput)="formatarInput($event)"
      ></ion-input>
    </ion-item>

    <div class="actions">
      <ion-button expand="block" shape="round" (click)="adicionarVenda()">
        Adicionar venda
      </ion-button>
      <ion-button expand="block" shape="round" color="warning" (click)="resetarMes()">
        Resetar mês
      </ion-button>
    </div>

    <ion-list>
      <ion-list-header>
        <ion-label>Histórico de vendas</ion-label>
      </ion-list-header>

      <ion-item *ngFor="let venda of vendas; let i = index">
        <ion-label>
          <h2>{{ formatarMoeda(venda.valor) }}</h2>
          <p>{{ venda.data }}</p>
        </ion-label>
        <ion-button slot="end" fill="clear" color="danger" (click)="removerVenda(i)">
          🗑️
        </ion-button>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
